<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0d1f;
  color:#fff;
  display:flex;
  justify-content:center;
}
.container{
  max-width:600px;
  width:100%;
  padding:20px;
}
.question{
  font-size:22px;
  margin-bottom:20px;
}
.option{
  background:#141832;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}
.btn{
  background:#caa56c;
  color:#000;
  padding:15px;
  border-radius:30px;
  text-align:center;
  cursor:pointer;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div id="start">
  <h1>Diagnóstico</h1>

  <input id="nome" placeholder="Seu nome"><br><br>
  <input id="whatsapp" placeholder="WhatsApp"><br>

  <div class="btn" onclick="start()">Começar</div>
</div>

<div id="quiz" style="display:none;">
  <div class="question" id="question"></div>
  <div id="options"></div>
</div>

<div id="result" style="display:none;">
  <h1 id="resultTitle"></h1>
</div>

</div>

<script>

const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScRK4CW6F7nm7mfoJNlpMa_S7pCw5Q5K4tvjO1OV0tqTJNItw/formResponse";

const questions = [
{
title:"Quando seu marido demonstra carinho...",
options:[
{text:"Fico desconfortável", scores:{frio:3}},
{text:"Desconfio", scores:{ausente:3}},
{text:"Não me sinto merecedora", scores:{condicional:3}},
{text:"Fico irritada", scores:{explosivo:3}}
]
},
{
title:"Quando brigam...",
options:[
{text:"Me calo", scores:{frio:3}},
{text:"Quero ir embora", scores:{ausente:3}},
{text:"Faço tudo pra resolver", scores:{condicional:3}},
{text:"Explodo", scores:{explosivo:3}}
]
}
];

const results = {
frio:"Filha do Pai Frio",
ausente:"Filha do Pai Ausente",
condicional:"Filha do Pai Condicional",
explosivo:"Filha do Pai Explosivo"
};

let current = 0;
let answers = [];

function start(){
document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";
render();
}

function render(){
const q = questions[current];
document.getElementById("question").innerText = q.title;

const container = document.getElementById("options");
container.innerHTML="";

q.options.forEach(opt=>{
  const div = document.createElement("div");
  div.className="option";
  div.innerText = opt.text;
  div.onclick = ()=>select(opt);
  container.appendChild(div);
});
}

function select(option){
answers.push(option);
current++;

if(current < questions.length){
  render();
}else{
  finish();
}
}

function finish(){

let totals = {frio:0, ausente:0, condicional:0, explosivo:0};

answers.forEach(a=>{
  for(let k in a.scores){
    totals[k]+=a.scores[k];
  }
});

let winner = "frio";

Object.keys(totals).forEach(k=>{
  if(totals[k] > totals[winner]) winner = k;
});

const resultText = results[winner];

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("resultTitle").innerText = resultText;

sendToGoogle(resultText, totals);
}

function sendToGoogle(result, totals){

const nome = document.getElementById("nome").value;
const whatsapp = document.getElementById("whatsapp").value;

const formData = new FormData();

formData.append("entry.282931895", nome);
formData.append("entry.1799475566", whatsapp);
formData.append("entry.2129250980", result);
formData.append("entry.375136606", result);
formData.append("entry.1276612145", JSON.stringify(answers));
formData.append("entry.712224340", JSON.stringify(totals));
formData.append("entry.225565478", result + " - " + JSON.stringify(answers));

fetch(FORM_URL, {
  method: "POST",
  mode: "no-cors",
  body: formData
});

}

</script>

</body>
</html>
